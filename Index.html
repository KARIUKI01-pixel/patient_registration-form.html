<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration Form</title>
</head>
<body>
    <h1>Patient Registration Form</h1>
    <p>please fill all the required fields before submitting the form.</p>
    <form>
        <label for="fullname">Full Name:</label><br>
        <input type="text" id="fullname" name="fullname" required><br><br>
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>
        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" required><br><br>    
        <label for="dob">Date of Birth:</label><br>
        <input type="date" id="dob" name="dob" required><br><br>
        <label for="gender">Gender:</label><br>
        <input type="radio" id="male" name="gender" value="male" required>
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female" required>
        <label for="female">Female</label>
        <input type="radio" id="other" name="gender" value="other" required>
        <label for="other">Other</label><br><br>
        <label for="service">Service Required:</label><br>
        <select id="service" name="service" required>
            <option value="">Select a service</option>
            <option value="general">General Consultation</option>
            <option value="lab test">Laboratory Test</option>
            <option value="pharmacy">Pharmacy</option>
        </select><br><br>
        <label for="county">County of residence:</label><br>
        <select id="county" name="county" required>
            <option value="">Select a county</option>
            <option value="mombasa">Mombasa</option>
            <option value="kwale">Kwale</option>
            <option value="kilifi">Kilifi</option>
            <option value="tana river">Tana River</option>
            <option value="lamu">Lamu</option>
            <option value="taita taveta">Taita Taveta</option>
        </select><br><br>
        <label for="comments">Additional Comments:</label><br>
        <textarea id="comments" name="comments" rows="4" cols="50" placeholder="Enter any additional information..."></textarea><br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </form>

</body>
</html>
